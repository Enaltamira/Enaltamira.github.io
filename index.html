<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En Altamira</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>En Altamira</h1>
        <div id="cart-icon" onclick="toggleCart()">
            🛒 Mi Carrito (<span id="cart-count">0</span>)
        </div>
    </header>

    <main class="container">
<aside class="sidebar">
    <div class="category-group">
        <h3 style="color: var(--primario); border-bottom: 1px solid #ddd; padding-bottom: 5px;">🍔 Listos para comer</h3>
        <nav id="listos-comer">
            </nav>
    </div>

    <div class="category-group" style="margin-top: 30px;">
        <h3 style="color: var(--acentos); border-bottom: 1px solid #ddd; padding-bottom: 5px;">❄️ Bajo pedido</h3>
        <nav id="bajo-pedido">
            </nav>
    </div>

    <div class="category-group" style="margin-top: 30px;">
        <h3 style="color: var(--acentos); border-bottom: 1px solid #ddd; padding-bottom: 5px;">🛠️ Servicios</h3>
        <nav id="servicios-list">
            </nav>
    </div>
</aside>

        <section class="products-display">
            <h2 id="store-name">Selecciona una tienda</h2>
            <div id="products-grid" class="grid">
                </div>
        </section>
    </main>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="toggleCart()">&times;</span>
            <h2>Tu Pedido</h2>
            <div id="cart-items"></div>
            <p><strong>Total: $<span id="cart-total">0</span></strong></p>
            
<form id="checkout-form" action="https://formspree.io/f/mykbgnzl" method="POST" onsubmit="confirmarPedido()">
    <input type="hidden" name="_subject" value="Nuevo Pedido Recibido">
    
    <input type="text" name="nombre" placeholder="Nombre Completo" 
           pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+" 
           maxlength="50" 
           title="Solo se permiten letras" required>

    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <select name="ubicacion_tipo" id="torre-select" required>
            <option value="" disabled selected>Torre / Lugar</option>
            <option value="Cancha">Cancha</option>
            <option value="Plazoleta">Plazoleta</option>
            </select>

        <select name="apartamento" id="apto-select" required>
            <option value="" disabled selected>Apto</option>
            </select>
    </div>

    <div class="form-group">
    <label for="cliente-celular">Nequi y WhatsApp:</label>
    <input type="tel" id="cliente-celular" name="celular" 
           pattern="[0-9]{10}" 
           title="Debe ingresar exactamente 10 números" 
           placeholder="3000000000" required>
</div>

<div class="form-group">
    <label for="cliente-notas">Indicaciones especiales:</label>
    <textarea id="cliente-notas" name="notas" 
              placeholder="Ej: Sin cebolla, portería 2, etc."
              oninput="this.value = this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g, '')"></textarea>
</div>

<input type="hidden" id="hidden-cart-data" name="pedido_completo">
    
    
    <textarea name="pedido" id="hidden-cart-data" style="display:none"></textarea>
    
    <button type="submit" class="btn-green" style="margin-top: 15px;">Pedir</button>
</form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
